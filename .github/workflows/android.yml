name: Android Build

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      build_type:
        description: "Select build type"
        required: true
        default: all
        type: choice
        options:
          - debug
          - release-apk
          - release-aab
          - all

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create google-services.json
        run: |
          cat <<EOF > app/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Create signing files
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_FILE: ${{ secrets.STORE_FILE }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p app/keystore

          echo "Secret length: ${#RELEASE_KEYSTORE_BASE64}"

          echo "$RELEASE_KEYSTORE_BASE64" | tr -d '\r\n\t ' > keystore.txt

          python3 << 'EOF'
          import base64

          with open("keystore.txt", "r") as f:
              data = f.read().strip()

          decoded = base64.b64decode(data, validate=True)

          with open("app/keystore/release.jks", "wb") as out:
              out.write(decoded)

          print("Keystore decoded successfully")
          print("Decoded size:", len(decoded), "bytes")
          EOF

          cat > app/keystore/Signature.properties <<EOF
          STORE_FILE=$STORE_FILE
          STORE_PASSWORD=$STORE_PASSWORD
          KEY_ALIAS=$KEY_ALIAS
          KEY_PASSWORD=$KEY_PASSWORD
          EOF

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release-apk' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release-apk' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Build Release AAB
        if: github.event.inputs.build_type == 'release-aab' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: ./gradlew bundleRelease

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'release-aab' || github.event.inputs.build_type == 'all' || github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
